spring.application.name=pixben
server.port=${PORT:8080}

# PostgreSQL / Neon en producción. En local se usa H2 para que NetBeans pueda compilar
# y ejecutar sin copiar credenciales de Render al proyecto.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:pixben;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# MongoDB Atlas en producción. El valor local solo permite levantar el contexto;
# los módulos Mongo requieren Atlas o un Mongo local para operar.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/pixben}
spring.data.mongodb.auto-index-creation=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=80MB
server.error.include-message=always

# Web Push / PWA (configurar en Render; la clave privada nunca va al repositorio)
app.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.vapid.subject=${VAPID_SUBJECT:https://pixben.netlify.app}
